<body>
<canvas id="cv"></canvas>
<div id="help"><div id="helpcard"></div></div>

<script>
"use strict";
/* ============================================================
   熔炉防线 / 深网防线 —— 逻辑层（无 DOM，主题无关）
   四条核心循环：传送带手牌 / 两级材质合成 / 威胁计时 / 攻城胜负。
   桌面形态：10×14 无重力锻造盘，行或列铺满即锻打消除。
   ============================================================ */

/* ---------------- 配置 ---------------- */
const COLS = 10, ROWS = 14;
const BELT_N = 8;
const BELT_PERIOD0 = 3.2, BELT_PERIOD_MIN = 2.0, BELT_RAMP = 0.004; // 传送带随时间提速
const DIG_PERIOD = 28, REWIND = 15;      // 挖掘周期 / 秘银回拨秒数
const CASTLE_HP = 3, WALL_HP = 3;
const MELT_COST = 3;                      // 熔毁令挖掘进度 +3 秒
const CLEAR_SCORE = [0, 100, 300, 600, 1000, 1500, 2100];

/* 盘面格值：0 空，1 赤钢（普通），2 精金，3 哥布林岩层，4 秘银 */

/* 棋子几何：2~4 格小件，决策快、对子常见 */
const SHAPE_DEFS = [
  { id: "P2", name: "二连", w: 3, cells: [[0,0],[1,0]] },
  { id: "I3", name: "长三", w: 3, cells: [[0,0],[1,0],[2,0]] },
  { id: "V3", name: "拐三", w: 2, cells: [[0,0],[0,1],[1,1]] },
  { id: "I4", name: "长四", w: 2, cells: [[0,0],[1,0],[2,0],[3,0]] },
  { id: "O4", name: "方四", w: 2, cells: [[0,0],[1,0],[0,1],[1,1]] },
  { id: "T4", name: "丁四", w: 2, cells: [[0,0],[1,0],[2,0],[1,1]] },
  { id: "S4", name: "蛇四", w: 1, cells: [[1,0],[2,0],[0,1],[1,1]] },
  { id: "L4", name: "拐四", w: 1, cells: [[0,0],[0,1],[0,2],[1,2]] }
];
function normCells(cs) {
  let mx = 99, my = 99;
  cs.forEach(c => { mx = Math.min(mx, c[0]); my = Math.min(my, c[1]); });
  return cs.map(c => [c[0] - mx, c[1] - my]).sort((a, b) => a[1] - b[1] || a[0] - b[0]);
}
function rotsOf(cells) {
  const out = [], seen = {};
  let cur = normCells(cells);
  for (let i = 0; i < 4; i++) {
    const key = cur.map(c => c.join(",")).join(";");
    if (!seen[key]) { seen[key] = 1; out.push(cur); }
    cur = normCells(cur.map(c => [c[1], -c[0]]));
  }
  return out;
}
SHAPE_DEFS.forEach(s => {
  s.rots = rotsOf(s.cells);
  s.wds = s.rots.map(r => Math.max(...r.map(c => c[0])) + 1);
  s.hts = s.rots.map(r => Math.max(...r.map(c => c[1])) + 1);
});
const SHAPE_IDX = {};
SHAPE_DEFS.forEach((s, i) => SHAPE_IDX[s.id] = i);
const SPAWN_BAG = [];
SHAPE_DEFS.forEach((s, i) => { for (let k = 0; k < s.w; k++) SPAWN_BAG.push(i); });

/* ---------------- 随机数（可复现种子） ---------------- */
function fnv1a(str, h) {
  h = h >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return h >>> 0;
}
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ---------------- 状态 ---------------- */
function newGame(seedStr) {
  return {
    seed: String(seedStr),
    rng: mulberry32(fnv1a(String(seedStr), 2166136261)),
    tick: 0, time: 0, over: false, win: false,
    score: 0, lines: 0, combo: 0, bestCombo: 0,
    castle: CASTLE_HP, wall: WALL_HP,
    board: Array.from({ length: ROWS }, () => Array(COLS).fill(0)),
    belt: Array(BELT_N).fill(null), beltT: 0,
    hand: null,                       // { s, m, rot, gx, gy }
    digT: 0,
    nextId: 1,
    ev: [],                           // 演出事件队列，表现层消费
    n: { spawns: 0, picks: 0, mergeS: 0, mergeG: 0, melts: 0, places: 0,
         clears: 0, rises: 0, smashes: 0, rewinds: 0, castleHit: 0, wallHit: 0 }
  };
}
function ev(g, type, data) { g.ev.push(Object.assign({ type }, data)); }

/* ---------------- 传送带 ---------------- */
function beltPeriod(g) { return Math.max(BELT_PERIOD_MIN, BELT_PERIOD0 - g.time * BELT_RAMP); }
function drawShapeIdx(g) {
  /* 同模再铸：45% 概率复铸带上已有形状，让对子/三连自然出现（合成经济的引擎） */
  const occ = g.belt.filter(Boolean);
  if (occ.length && g.rng() < 0.45) return occ[(g.rng() * occ.length) | 0].s;
  return SPAWN_BAG[(g.rng() * SPAWN_BAG.length) | 0];
}
function compressBelt(g) {
  const items = g.belt.filter(Boolean);
  for (let i = 0; i < BELT_N; i++) {
    const it = items[i] || null;
    if (g.belt[i] !== it) {
      const oldIdx = it ? g.belt.indexOf(it) : -1;
      g.belt[i] = it;
      if (it && oldIdx > i) it.slide = (oldIdx - i);   // 向队首滑动动画量（槽位）
    }
  }
}
function beltSpawn(g) {
  if (g.belt[BELT_N - 1]) return;
  const s = drawShapeIdx(g);
  g.belt[BELT_N - 1] = { s, m: 0, id: g.nextId++, slide: 1 };  // 从带尾滑入
  g.n.spawns++;
  ev(g, "spawn", { slot: BELT_N - 1 });
  compressBelt(g);
}
function pick(g, i) {
  if (g.over || g.hand || !g.belt[i]) return false;
  const it = g.belt[i];
  g.belt[i] = null;
  g.hand = { s: it.s, m: it.m, rot: 0, gx: 3, gy: 4 };
  g.n.picks++;
  ev(g, "pick", { slot: i, s: it.s, m: it.m });
  compressBelt(g);
  return true;
}
function mergeInfo(g, i) {
  const a = g.belt[i], b = g.belt[i + 1];
  if (!a || !b || a.s !== b.s || a.m !== b.m || a.m === 2) return null;
  const c = g.belt[i + 2];
  if (a.m === 0 && c && c.s === a.s && c.m === 0) return { take: 3, mat: 2 };
  return { take: 2, mat: a.m === 0 ? 1 : 2 };
}
function mergeAt(g, i) {
  if (g.over) return false;
  const info = mergeInfo(g, i);
  if (!info) return false;
  g.belt[i] = { s: g.belt[i].s, m: info.mat, id: g.nextId++, slide: 0 };
  for (let k = 1; k < info.take; k++) g.belt[i + k] = null;
  if (info.mat === 1) g.n.mergeS++; else g.n.mergeG++;
  ev(g, "merge", { slot: i, mat: info.mat, take: info.take });
  compressBelt(g);
  return true;
}

/* ---------------- 放置与锻打 ---------------- */
function fits(g, s, rot, gx, gy) {
  return SHAPE_DEFS[s].rots[rot].every(c => {
    const x = gx + c[0], y = gy + c[1];
    return x >= 0 && x < COLS && y >= 0 && y < ROWS && !g.board[y][x];
  });
}
function anyFit(g, s, m) {
  for (let r = 0; r < SHAPE_DEFS[s].rots.length; r++)
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++)
      if (fits(g, s, r, x, y)) return true;
  return false;
}
function placeHand(g) {
  if (g.over || !g.hand) return false;
  const h = g.hand;
  if (!fits(g, h.s, h.rot, h.gx, h.gy)) return false;
  const val = h.m === 2 ? 2 : h.m === 1 ? 4 : 1;
  const cs = SHAPE_DEFS[h.s].rots[h.rot].map(c => [h.gx + c[0], h.gy + c[1]]);
  cs.forEach(c => { g.board[c[1]][c[0]] = val; });
  g.score += cs.length;
  g.n.places++;
  ev(g, "place", { cells: cs, m: h.m });
  g.hand = null;
  resolveLines(g, h.m, cs);
  return true;
}
function meltHand(g) {
  if (g.over || !g.hand) return false;
  g.hand = null;
  g.digT = Math.min(DIG_PERIOD, g.digT + MELT_COST);
  g.n.melts++;
  ev(g, "melt", {});
  return true;
}
function resolveLines(g, mat, placedCells) {
  const rows = [], cols = [];
  for (let y = 0; y < ROWS; y++)
    if (g.board[y].every(v => v === 1 || v === 2 || v === 4)) rows.push(y);
  for (let x = 0; x < COLS; x++) {
    let full = true;
    for (let y = 0; y < ROWS; y++) if (!(g.board[y][x] === 1 || g.board[y][x] === 2 || g.board[y][x] === 4)) { full = false; break; }
    if (full) cols.push(x);
  }
  if (!rows.length && !cols.length) { g.combo = 0; return; }

  const L = rows.length + cols.length;
  let silverLine = false, goldLines = 0;
  rows.forEach(y => {
    if (g.board[y].includes(4)) silverLine = true;
    if (g.board[y].includes(2)) goldLines++;
  });
  cols.forEach(x => {
    let hasS = false, hasG = false;
    for (let y = 0; y < ROWS; y++) { if (g.board[y][x] === 4) hasS = true; if (g.board[y][x] === 2) hasG = true; }
    if (hasS) silverLine = true;
    if (hasG) goldLines++;
  });

  rows.forEach(y => g.board[y].fill(0));
  cols.forEach(x => { for (let y = 0; y < ROWS; y++) g.board[y][x] = 0; });

  g.lines += L;
  g.n.clears++;
  g.combo++;
  g.bestCombo = Math.max(g.bestCombo, g.combo);
  g.score += (CLEAR_SCORE[Math.min(L, CLEAR_SCORE.length - 1)]) + 50 * (g.combo - 1);
  ev(g, "clear", { rows, cols, combo: g.combo });

  let kills = goldLines;
  if (mat === 2) kills += 1;       // 精金件直接锻掉：合计 2 层
  if (mat === 1) kills += 1;       // 秘银件直接锻掉：额外 1 层
  if (silverLine) {
    g.digT = Math.max(0, g.digT - REWIND);
    g.n.rewinds++;
    ev(g, "rewind", {});
  }
  if (kills) smash(g, kills);
}

/* ---------------- 砸层 / 攻城 ---------------- */
function smash(g, k) {
  for (; k > 0 && !g.over; k--) {
    let idx = -1;
    for (let y = ROWS - 1; y >= 0; y--) if (g.board[y].includes(3)) { idx = y; break; }
    if (idx < 0) {
      g.castle--; g.n.castleHit++; g.score += 300;
      ev(g, "castle", { left: g.castle });
      if (g.castle <= 0) { g.win = true; g.over = true; ev(g, "win", {}); }
      continue;
    }
    g.board.splice(idx, 1);
    g.board.unshift(Array(COLS).fill(0));
    g.n.smashes++; g.score += 150;
    ev(g, "smash", {});
  }
}

/* ---------------- 哥布林上顶 ---------------- */
function rise(g) {
  g.digT = 0;
  if (g.board[0].some(v => v)) {
    g.wall--; g.n.wallHit++;
    ev(g, "wall", { left: g.wall });
    if (g.wall <= 0) { g.over = true; ev(g, "lose", {}); }
    return;
  }
  g.board.shift();
  g.board.push(Array(COLS).fill(3));
  g.n.rises++;
  ev(g, "rise", {});
}

/* ---------------- 主时钟 ---------------- */
function tick(g, dt) {
  if (g.over) return;
  g.time += dt;
  g.digT += dt;
  if (g.digT >= DIG_PERIOD) rise(g);
  if (g.over) return;
  g.beltT += dt;
  if (g.beltT >= beltPeriod(g)) { g.beltT = 0; beltSpawn(g); }
}

if (typeof module !== "undefined")
  module.exports = { newGame, tick, pick, mergeAt, mergeInfo, placeHand, meltHand,
                     fits, anyFit, smash, rise, compressBelt,
                     SHAPE_DEFS, COLS, ROWS, BELT_N, DIG_PERIOD, REWIND };
</script>

/* ================= 主题定义 ================= */

const THEMES = {

function drawCyberBG(t) {

/* ================= 传送带 ================= */
function drawBelt(dt) {
  const Pn = L.beltPanel, d = L.beltDir;
  ctx.fillStyle = PAL.panelFill; rr(Pn.x, Pn.y, Pn.w, Pn.h, 10); ctx.fill();
  ctx.strokeStyle = PAL.panelStroke; ctx.lineWidth = 1; rr(Pn.x, Pn.y, Pn.w, Pn.h, 10); ctx.stroke();
  if (d === "v") txt(STR.beltLabel, Pn.x + Pn.w / 2, Pn.y + 16, 11, PAL.brass, "center", "600", SERIF_TITLE);
  ctx.fillStyle = hexA(PAL.brass, .12);
  const off = (performance.now() / 40) % 20;
  if (d === "h") {
    for (let x = Pn.x + Pn.w + 20 - off; x > Pn.x; x -= 20) {
      ctx.beginPath(); ctx.moveTo(x, Pn.y + 5); ctx.lineTo(x - 7, Pn.y + 9); ctx.lineTo(x, Pn.y + 13); ctx.closePath(); ctx.fill();
    }
  } else {
    for (let y = Pn.y + Pn.h + 20 - off; y > Pn.y + 24; y -= 20) {
      ctx.beginPath(); ctx.moveTo(Pn.x + 10, y); ctx.lineTo(Pn.x + 14, y - 7); ctx.lineTo(Pn.x + 18, y); ctx.closePath(); ctx.fill();
    }
  }
  const full = g.belt.every(Boolean);
  for (let i = 0; i < BELT_N; i++) {
    const s = slotR(i), it = g.belt[i];
    ctx.fillStyle = full && it ? "#1a1214" : PAL.slotFill;
    rr(s.x, s.y, s.w, s.h, 7); ctx.fill();
    ctx.strokeStyle = it ? (it.m ? PAL.matStroke[it.m] : PAL.slotEmpty) : PAL.slotEmpty;
    ctx.lineWidth = it && it.m ? 1.6 : 1;
    rr(s.x, s.y, s.w, s.h, 7); ctx.stroke();
    if (it && it.m === 2) { ctx.save(); ctx.globalAlpha = .35 + .3 * Math.sin(performance.now() / 300);
      ctx.strokeStyle = "#ffd76a"; rr(s.x - 1.5, s.y - 1.5, s.w + 3, s.h + 3, 8); ctx.stroke(); ctx.restore(); }
    if (!it) continue;
    if (it.slide) it.slide *= Math.exp(-8 * dt);
    if (it.pop) it.pop *= Math.exp(-6 * dt);
    const dxy = (it.slide || 0) * L.beltStride;
    const dx = d === "h" ? dxy : 0, dy = d === "v" ? dxy : 0;
    const sc = 1 - .3 * (it.pop || 0);
    if (!g.hand && !g.over && !anyFit(g, it.s, it.m)) {
      ctx.save(); ctx.globalAlpha = .5 + .35 * Math.sin(performance.now() / 200);
      ctx.strokeStyle = PAL.hot; rr(s.x + 1, s.y + 1, s.w - 2, s.h - 2, 6); ctx.stroke(); ctx.restore();
    }
    ctx.save();
    ctx.translate(s.x + s.w / 2 + dx, s.y + s.h / 2 - (d === "h" ? 4 : 2) + dy);
    ctx.scale(sc, sc);
    drawMini(it.s, it.m);
    ctx.restore();
    txt(SHAPE_DEFS[it.s].name + STR.matShort[it.m], s.x + s.w / 2 + dx, s.y + s.h - (d === "h" ? 8 : 10), d === "h" ? 8.5 : 10,
        it.m ? PAL.matText[it.m] : "#6a7490", "center");
    if (lastInput === "kb" && kb.beltSel === i && !g.hand && !g.over) {
      ctx.strokeStyle = hexA(PAL.brassHi, .6); ctx.lineWidth = 1.5;
      rr(s.x - 2, s.y - 2, s.w + 4, s.h + 4, 8); ctx.stroke();
    }
  }
  /* 合成徽章 */
  for (let i = 0; i < BELT_N - 1; i++) {
    const info = mergeInfo(g, i);
    if (!info) continue;
    const bp = badgePos(i), gold = info.mat === 2;
    ctx.save();
    ctx.shadowColor = gold ? "rgba(255,210,80,.9)" : "rgba(140,220,240,.8)"; ctx.shadowBlur = 8 + 4 * Math.sin(performance.now() / 240);
    ctx.fillStyle = gold ? grad(bp.x, bp.y - bp.r, bp.x, bp.y + bp.r, [[0, "#ffe58a"], [1, "#c9920f"]])
                         : grad(bp.x, bp.y - bp.r, bp.x, bp.y + bp.r, [[0, "#eafcff"], [1, "#5f98b0"]]);
    ctx.beginPath(); ctx.arc(bp.x, bp.y, bp.r, 0, 6.2832); ctx.fill();
    ctx.restore();
    txt("合", bp.x, bp.y + .5, 10, "#2e2405", "center", "700");
  }
  if (full && !g.over) {
    if (d === "h") txt(STR.beltFull, Pn.x + Pn.w / 2, Pn.y + Pn.h + 12, 10, "#ff8a7a", "center");
    else txt(STR.beltFullV, Pn.x + Pn.w / 2, Pn.y + Pn.h - 8, 11, "#ff8a7a", "center");
  }
}
function drawMini(s, m) {
  const cells = SHAPE_DEFS[s].rots[0];
  const w = SHAPE_DEFS[s].wds[0], h = SHAPE_DEFS[s].hts[0], u = L.miniU;
  const v = m === 2 ? 2 : m === 1 ? 4 : 1;
  cells.forEach(c => drawCell((c[0] - (w - 1) / 2) * u - u / 2, (c[1] - (h - 1) / 2) * u - u / 2, v, u));
}

/* ================= 盘面 ================= */
function drawBoard() {
  const b = B(), bw = COLS * b.cell, bh = ROWS * b.cell;
  ctx.fillStyle = PAL.boardFrame; rr(b.x - 7, b.y - 7, bw + 14, bh + 14, 9); ctx.fill();
  ctx.strokeStyle = PAL.brass; ctx.lineWidth = 1.5; rr(b.x - 7, b.y - 7, bw + 14, bh + 14, 9); ctx.stroke();
  ctx.strokeStyle = hexA(PAL.brass, .25); ctx.lineWidth = 1; rr(b.x - 4, b.y - 4, bw + 8, bh + 8, 6); ctx.stroke();
  [[b.x - 7, b.y - 7], [b.x + bw + 7, b.y - 7], [b.x - 7, b.y + bh + 7], [b.x + bw + 7, b.y + bh + 7]].forEach(p => {
    ctx.fillStyle = PAL.brassHi; ctx.beginPath(); ctx.arc(p[0], p[1], 2.2, 0, 6.2832); ctx.fill();
  });
  const shift = boardShiftT > 0 ? boardShiftT / .35 * b.cell : 0;
  ctx.save(); rr(b.x, b.y, bw, bh, 3); ctx.clip();
  ctx.fillStyle = PAL.boardBg; ctx.fillRect(b.x, b.y, bw, bh);
  ctx.strokeStyle = PAL.skin === "cyber" ? "rgba(0,229,255,.06)" : "rgba(180,190,220,.05)"; ctx.lineWidth = 1;
  for (let x = 1; x < COLS; x++) { ctx.beginPath(); ctx.moveTo(b.x + x * b.cell, b.y); ctx.lineTo(b.x + x * b.cell, b.y + bh); ctx.stroke(); }
  for (let y = 1; y < ROWS; y++) { ctx.beginPath(); ctx.moveTo(b.x, b.y + y * b.cell); ctx.lineTo(b.x + bw, b.y + y * b.cell); ctx.stroke(); }
  ctx.translate(0, shift);
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const v = g.board[y][x];
    if (v) drawCell(b.x + x * b.cell, b.y + y * b.cell, v);
  }
  ctx.translate(0, -shift);
  /* 手中件幽灵 */
  if (g.hand) {
    const h = g.hand, ok = fits(g, h.s, h.rot, h.gx, h.gy);
    const v = h.m === 2 ? 2 : h.m === 1 ? 4 : 1;
    ctx.globalAlpha = ok ? .55 : .3;
    SHAPE_DEFS[h.s].rots[h.rot].forEach(c => {
      const px = b.x + (h.gx + c[0]) * b.cell, py = b.y + (h.gy + c[1]) * b.cell;
      if (px < b.x - b.cell || px > b.x + bw || py < b.y - b.cell || py > b.y + bh) return;
      drawCell(px, py, v);
    });
    ctx.globalAlpha = 1;
    ctx.strokeStyle = ok ? "rgba(255,255,255,.85)" : hexA(PAL.hot, .9);
    ctx.lineWidth = 2;
    SHAPE_DEFS[h.s].rots[h.rot].forEach(c => {
      const px = b.x + (h.gx + c[0]) * b.cell, py = b.y + (h.gy + c[1]) * b.cell;
      rr(px + 1, py + 1, b.cell - 2, b.cell - 2, 3); ctx.stroke();
    });
  }
  /* 消除光束 */
  if (clearAnim) {
    const a = 1 - clearAnim.t / .45;
    if (a <= 0) clearAnim = null;
    else {
      ctx.globalAlpha = a * .9;
      clearAnim.rows.forEach(y => {
        ctx.fillStyle = grad(b.x, 0, b.x + bw, 0, [[0, "rgba(255,255,255,0)"], [.5, "#fff"], [1, "rgba(255,255,255,0)"]]);
        ctx.fillRect(b.x, b.y + y * b.cell, bw, b.cell);
      });
      clearAnim.cols.forEach(x => {
        ctx.fillStyle = grad(0, b.y, 0, b.y + bh, [[0, "rgba(255,255,255,0)"], [.5, "#fff"], [1, "rgba(255,255,255,0)"]]);
        ctx.fillRect(b.x + x * b.cell, b.y, b.cell, bh);
      });
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
  /* 威胁压迫：底部辉光 */
  let grows = 0;
  for (let y = ROWS - 1; y >= 0 && g.board[y].includes(3); y--) grows++;
  if (grows) {
    const gl2 = ctx.createLinearGradient(0, b.y + bh - grows * b.cell - 30, 0, b.y + bh);
    gl2.addColorStop(0, "rgba(0,0,0,0)"); gl2.addColorStop(1, PAL.threatGlow);
    ctx.fillStyle = gl2; ctx.fillRect(b.x, b.y + bh - grows * b.cell - 30, bw, grows * b.cell + 30);
  }
}

/* ================= 敌方核心 ================= */
function drawCastle() {
  if (PAL.skin === "cyber") drawCyberCastle();
  else drawForgeCastle();
}
function drawForgeCastle() {
  const C = L.castle, gx = C.x + C.w / 2, gw = C.w * .08;
  ctx.save();
  if (g.win) ctx.translate(0, 6);
  ctx.fillStyle = g.win ? "#1a1820" : grad(0, C.y, 0, C.y + C.h, [[0, "#221c33"], [1, "#141020"]]);
  ctx.beginPath();
  ctx.moveTo(C.x, C.y + C.h);
  ctx.lineTo(C.x, C.y + 18);
  const teeth = 12;
  for (let i = 0; i <= teeth; i++) {
    const x = C.x + (C.w / teeth) * i;
    ctx.lineTo(x, C.y + (i % 2 ? 4 : 14));
  }
  ctx.lineTo(C.x + C.w, C.y + C.h);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = PAL.panelStroke; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(gx - gw, C.y + C.h);
  ctx.lineTo(gx - gw, C.y + C.h * .5);
  ctx.arc(gx, C.y + C.h * .5, gw, Math.PI, 0);
  ctx.lineTo(gx + gw, C.y + C.h);
  ctx.closePath();
  ctx.fillStyle = "#0a0710"; ctx.fill();
  ctx.strokeStyle = PAL.brass; ctx.lineWidth = 1.2; ctx.stroke();
  if (!g.win) {
    const pg = ctx.createRadialGradient(gx, C.y + C.h * .55, 2, gx, C.y + C.h * .55, gw * .9);
    pg.addColorStop(0, "rgba(150,230,90,.4)"); pg.addColorStop(1, "rgba(150,230,90,0)");
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(gx, C.y + C.h * .55, gw * .9, 0, 6.2832); ctx.fill();
    ctx.save();
    ctx.shadowColor = "rgba(170,250,100,.95)"; ctx.shadowBlur = 7;
    ctx.fillStyle = "#c8f06a";
    const eo = 7 + Math.sin(performance.now() / 700) * .8;
    ctx.beginPath(); ctx.arc(gx - eo, C.y + C.h * .62, 2.6, 0, 6.2832); ctx.fill();
    ctx.beginPath(); ctx.arc(gx + eo, C.y + C.h * .62, 2.6, 0, 6.2832); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#221c33";
    ctx.beginPath(); ctx.moveTo(gx - gw * .6, C.y + C.h * .36); ctx.lineTo(gx - gw * .95, C.y + 8); ctx.lineTo(gx - gw * .3, C.y + C.h * .26); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(gx + gw * .6, C.y + C.h * .36); ctx.lineTo(gx + gw * .95, C.y + 8); ctx.lineTo(gx + gw * .3, C.y + C.h * .26); ctx.closePath(); ctx.fill();
  } else {
    ctx.strokeStyle = "rgba(0,0,0,.6)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(gx - gw * .7, C.y + C.h * .3); ctx.lineTo(gx + gw * .2, C.y + C.h * .7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + gw * .4, C.y + C.h * .4); ctx.lineTo(gx + gw * .75, C.y + C.h * .8); ctx.stroke();
  }
  txt(g.win ? STR.castleDead : STR.castleName, gx, C.y + C.h - 8, 10, g.win ? "#6a6478" : PAL.parch, "center", "600");
  if (castleFlashT > 0) {
    ctx.globalAlpha = castleFlashT * 1.4;
    ctx.fillStyle = "#fff";
    ctx.fillRect(C.x, C.y, C.w, C.h);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}
function drawCyberCastle() {
  const C = L.castle, gx = C.x + C.w / 2, cy = C.y + C.h * .52, r = C.h * .34;
  const t = performance.now() / 1000;
  /* 平台 */
  ctx.fillStyle = g.win ? "#14161c" : grad(0, C.y, 0, C.y + C.h, [[0, "#0e1622"], [1, "#080d16"]]);
  ctx.beginPath();
  ctx.moveTo(C.x, C.y + C.h);
  ctx.lineTo(C.x + C.w * .1, C.y + 6);
  ctx.lineTo(C.x + C.w * .9, C.y + 6);
  ctx.lineTo(C.x + C.w, C.y + C.h);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = PAL.panelStroke; ctx.lineWidth = 1.5; ctx.stroke();
  /* 六边形核心 */
  const hex = rad => {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 6 + i * Math.PI / 3;
      const x = gx + Math.cos(a) * rad, y = cy + Math.sin(a) * rad;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.closePath();
  };
  hex(r + 8);
  ctx.fillStyle = "#070a12"; ctx.fill();
  ctx.strokeStyle = g.win ? "#3a4048" : PAL.brass; ctx.lineWidth = 1.5; ctx.stroke();
  hex(r);
  ctx.fillStyle = g.win ? "#16181e" : grad(gx - r, cy - r, gx + r, cy + r, [[0, "#1a0a18"], [1, "#0a0510"]]);
  ctx.fill();
  if (!g.win) {
    /* 旋转扫描弧 */
    ctx.save();
    ctx.strokeStyle = hexA(PAL.brassHi, .7); ctx.lineWidth = 2;
    for (let k = 0; k < 3; k++) {
      ctx.beginPath();
      ctx.arc(gx, cy, r + 4, t * .9 + k * 2.094, t * .9 + k * 2.094 + 1.1);
      ctx.stroke();
    }
    /* 脉冲红眼 */
    const er = 5 + Math.sin(t * 3.2) * 1.6;
    ctx.shadowColor = "rgba(255,46,136,.95)"; ctx.shadowBlur = 12;
    ctx.fillStyle = "#ff2e88";
    ctx.beginPath(); ctx.arc(gx, cy, er, 0, 6.2832); ctx.fill();
    ctx.restore();
  } else {
    ctx.strokeStyle = "rgba(0,0,0,.7)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(gx - r * .6, cy - r * .4); ctx.lineTo(gx + r * .2, cy + r * .5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + r * .5, cy - r * .5); ctx.lineTo(gx + r * .1, cy + r * .6); ctx.stroke();
  }
  txt(g.win ? STR.castleDead : STR.castleName, gx, C.y + C.h - 8, 10, g.win ? "#6a6478" : PAL.parch, "center", "600");
  if (castleFlashT > 0) {
    ctx.globalAlpha = castleFlashT * 1.4;
    ctx.fillStyle = "#fff";
    ctx.fillRect(C.x, C.y, C.w, C.h);
    ctx.globalAlpha = 1;
  }
}

/* ================= 按钮 / 提示 / 结算 ================= */
function drawBtn(b, label, enabled, hot) {
  ctx.globalAlpha = enabled ? 1 : .38;
  ctx.fillStyle = hot ? grad(0, b.y, 0, b.y + b.h, [[0, hexA(PAL.hot, .55)], [1, hexA(PAL.hot, .3)]])
                      : grad(0, b.y, 0, b.y + b.h, [[0, "#1d2432"], [1, "#131824"]]);
  rr(b.x, b.y, b.w, b.h, 10); ctx.fill();
  ctx.strokeStyle = hot ? PAL.hot : PAL.brass; ctx.lineWidth = 1.2;
  rr(b.x, b.y, b.w, b.h, 10); ctx.stroke();
  txt(label, b.x + b.w / 2, b.y + b.h / 2 + 1, 14, enabled ? PAL.parch : "#8a8598", "center", "600");
  ctx.globalAlpha = 1;
}
function drawControls() {
  const holding = !!g.hand && !g.over;
  drawBtn(L.btnRot, STR.btnRot, holding, false);
  const deadHand = holding && !anyFit(g, g.hand.s, g.hand.m);
  drawBtn(L.btnMelt, STR.btnMelt, holding, deadHand);
  if (L.orient === "p")
    txt(g.over ? "" : holding ? (deadHand ? STR.hintDead : STR.hintHold) : STR.hintIdle,
        DW / 2, 744, 10, "#6a6478", "center");
}
function drawOverlay() {
  if (!g.over || performance.now() - overAt < (g.win ? 1100 : 700)) return;
  ctx.fillStyle = PAL.skin === "cyber" ? "rgba(3,2,8,.86)" : "rgba(5,4,10,.84)"; ctx.fillRect(0, 0, DW, DH);
  const win = g.win, cx = DW / 2;
  ctx.strokeStyle = hexA(PAL.brass, .5); ctx.lineWidth = 1;
  rr(cx - 150, DH / 2 - 130, 300, 250, 14); ctx.stroke();
  txt(win ? STR.winTitle : STR.loseTitle, cx, DH / 2 - 80, 26, win ? PAL.brassHi : "#ff8a7a", "center", "700", SERIF_TITLE);
  txt("得分 " + g.score + " · 锻打 " + g.lines + " 线 · 最佳连击 ×" + Math.max(1, g.bestCombo), cx, DH / 2 - 36, 12, PAL.parch, "center");
  txt("用时 " + Math.floor(g.time / 60) + "分" + Math.floor(g.time % 60) + "秒 · seed " + g.seed, cx, DH / 2 - 14, 10, "#8a8598", "center");
  drawBtn(L.ovA, "再来一局", true, false);
  drawBtn(L.ovB, "新的种子", true, false);
}

/* ================= 粒子 / 浮字 ================= */
function drawFx(dt) {
  for (let i = P.length - 1; i >= 0; i--) {
    const p = P[i]; p.t += dt;
    if (p.t >= p.l) { P.splice(i, 1); continue; }
    p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    ctx.globalAlpha = 1 - p.t / p.l; ctx.fillStyle = p.c;
    if (PAL.square) ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.2832); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
  for (let i = FLOATS.length - 1; i >= 0; i--) {
    const f = FLOATS[i]; f.t += dt;
    if (f.t > 1.3) { FLOATS.splice(i, 1); continue; }
    ctx.globalAlpha = f.t < .15 ? f.t / .15 : 1 - Math.max(0, (f.t - .8) / .5);
    txt(f.txt, f.x, f.y - f.t * 34, f.big ? 19 : 14, f.color, "center", "700");
  }
  ctx.globalAlpha = 1;
}
function drawHand() {
  if (!g.hand || lastInput !== "ptr" || !ptr.drag) return;
  const cell = B().cell;
  ctx.globalAlpha = .92;
  const v = g.hand.m === 2 ? 2 : g.hand.m === 1 ? 4 : 1;
  const w = SHAPE_DEFS[g.hand.s].wds[g.hand.rot], h = SHAPE_DEFS[g.hand.s].hts[g.hand.rot];
  SHAPE_DEFS[g.hand.s].rots[g.hand.rot].forEach(c => {
    drawCell(ptr.x + (c[0] - w / 2) * cell, ptr.y - (ptr.touch ? 64 : 16) + (c[1] - h / 2) * cell, v, cell * .9);
  });
  ctx.globalAlpha = 1;
}

/* ================= 输入 ================= */
function inRect(p, r) { return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h; }
function beltSlotAt(p) {
  for (let i = 0; i < BELT_N; i++) {
    const s = slotR(i);
    if (p.x >= s.x - 3 && p.x <= s.x + s.w + 3 && p.y >= s.y - 10 && p.y <= s.y + s.h + 8) return i;
  }
  return -1;
}
function mergeBadgeAt(p) {
  for (let i = 0; i < BELT_N - 1; i++) {
    if (!mergeInfo(g, i)) continue;
    const bp = badgePos(i), dx = p.x - bp.x, dy = p.y - bp.y, rr2 = bp.r + 4;
    if (dx * dx + dy * dy < rr2 * rr2) return i;
  }
  return -1;
}
function updateGhost(p) {
  if (!g.hand) return;
  const h = g.hand, cell = B().cell;
  const w = SHAPE_DEFS[h.s].wds[h.rot], hh = SHAPE_DEFS[h.s].hts[h.rot];
  const lift = ptr.touch ? 64 / cell : 0;
  h.gx = Math.round((p.x - B().x) / cell - w / 2);
  h.gy = Math.round((p.y - B().y) / cell - hh / 2 - lift);
}
function tryPlace() {
  if (!g.hand) return;
  if (!placeHand(g)) sfx("no");
}
cv.addEventListener("pointerdown", e => {
  ac();
  const p = toDesign(e);
  ptr.x = p.x; ptr.y = p.y; ptr.down = true; ptr.touch = e.pointerType !== "mouse";
  /* 右键 = 只旋转，不取件也不放置 */
  if (e.button === 2) { if (g.hand && !g.over) rotateHand(); return; }
  lastInput = "ptr";
  if (g.over) {
    if (performance.now() - overAt < 900) return;
    if (inRect(p, L.ovA)) { g = newGame(seed); overAt = 0; }
    else if (inRect(p, L.ovB)) { seed = "FORGE" + ((Math.random() * 1e6) | 0); g = newGame(seed); overAt = 0; }
    return;
  }
  if (inRect(p, L.icons.help)) { openHelp(); return; }
  if (inRect(p, L.icons.mute)) { muted = !muted; return; }
  if (inRect(p, L.icons.restart)) { g = newGame(seed); return; }
  if (g.hand && inRect(p, L.btnRot)) { rotateHand(); return; }
  if (g.hand && inRect(p, L.btnMelt)) { meltHand(g); return; }
  const mb = mergeBadgeAt(p);
  if (mb >= 0) { mergeAt(g, mb); return; }
  const b = B();
  if (g.hand && p.x >= b.x && p.x <= b.x + COLS * b.cell && p.y >= b.y && p.y <= b.y + ROWS * b.cell) {
    updateGhost(p); tryPlace(); ptr.drag = true; return;
  }
  const si = beltSlotAt(p);
  if (si >= 0 && !g.hand) {
    if (pick(g, si)) { kb.beltSel = si; ptr.drag = true; updateGhost(p); }
    return;
  }
});
cv.addEventListener("pointermove", e => {
  const p = toDesign(e);
  ptr.x = p.x; ptr.y = p.y;
  lastInput = "ptr";          /* 真实的指针移动即切回指针模式（R 旋转后恢复跟随） */
  if (g.hand) updateGhost(p);
});
cv.addEventListener("pointerup", e => {
  const p = toDesign(e);
  ptr.down = false;
  const b = B();
  if (ptr.drag && g.hand && p.x >= b.x - b.cell && p.x <= b.x + (COLS + 1) * b.cell && p.y >= b.y - b.cell && p.y <= b.y + (ROWS + 1) * b.cell) {
    updateGhost(p); tryPlace();
  }
  ptr.drag = false;
});
cv.addEventListener("contextmenu", e => {
  e.preventDefault();   /* 旋转在 pointerdown(button 2) 里处理，这里只压菜单 */
});
function rotateHand() {
  if (!g.hand) return;
  g.hand.rot = (g.hand.rot + 1) % SHAPE_DEFS[g.hand.s].rots.length;
  sfx("pick");
  if (lastInput === "ptr") updateGhost(ptr);
}
document.addEventListener("keydown", e => {
  ac(); lastInput = "kb";
  if (g.over) { if (e.key === "Enter" || e.key === " ") g = newGame(seed); return; }
  const h = g.hand;
  if (!h) {
    if (e.key === "ArrowLeft") kb.beltSel = Math.max(0, kb.beltSel - 1);
    else if (e.key === "ArrowRight") kb.beltSel = Math.min(BELT_N - 1, kb.beltSel + 1);
    else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(g, kb.beltSel); }
    else if (e.key >= "1" && e.key <= "8") pick(g, +e.key - 1);
    else if (e.key === "m" || e.key === "M") { const mi = firstMerge(); if (mi >= 0) mergeAt(g, mi); }
    return;
  }
  switch (e.key) {
    case "ArrowLeft": h.gx--; break;
    case "ArrowRight": h.gx++; break;
    case "ArrowUp": h.gy--; break;
    case "ArrowDown": h.gy++; break;
    case "r": case "R": rotateHand(); break;
    case "Enter": case " ": e.preventDefault(); tryPlace(); break;
    case "m": case "M": meltHand(g); break;
    case "Escape": break;
  }
});
function firstMerge() { for (let i = 0; i < BELT_N - 1; i++) if (mergeInfo(g, i)) return i; return -1; }

/* 调试/自动化句柄（只读状态 + 纯函数，不影响逻辑） */
window.GameAPI = {
  state: () => g,
  shapes: SHAPE_DEFS,
  fits: (s, r, x, y) => fits(g, s, r, x, y),
  anyFit: (s, m) => anyFit(g, s, m),
  mergeInfo: i => mergeInfo(g, i)
};

/* ================= 帮助（DOM 覆盖层） ================= */
const helpEl = document.getElementById("help");
const helpcardEl = document.getElementById("helpcard");
helpcardEl.innerHTML = STR.helpHTML +
  '<button id="startbtn">' + (THEME.id === "cyber" ? "接 入" : "开 炉") + "</button>" +
  '<a id="themeToggle">⇄ 切换主题：' + THEME.otherName + "</a>";
helpcardEl.querySelector("#startbtn").onclick = () => {
  helpEl.classList.remove("show");
  paused = false;
  ac();
};
helpcardEl.querySelector("#themeToggle").onclick = () => {
  try { localStorage.setItem("fb_theme", THEME.other); } catch (e) {}
  location.href = location.pathname + "?theme=" + THEME.other;
};
function openHelp() { paused = true; helpEl.classList.add("show"); }
openHelp();

/* ================= 主循环 ================= */
let last = performance.now();
function frame(now) {
  const dt = Math.min(.1, (now - last) / 1000); last = now;
  if (!paused) {
    tick(g, dt);
    drainEvents();
  }
  ember(dt);
  if (shakeT > 0) { shakeT -= dt; if (shakeT <= 0) shakeAmp = 0; }
  if (hurtT > 0) hurtT -= dt;
  if (fuseFlashT > 0) fuseFlashT -= dt;
  if (castleFlashT > 0) castleFlashT -= dt;
  if (boardShiftT > 0) boardShiftT -= dt;
  if (clearAnim) clearAnim.t += dt;

  ctx.save();
  if (shakeAmp > 0) {
    const k = shakeAmp * (shakeT / .45);
    ctx.translate((Math.random() - .5) * k, (Math.random() - .5) * k);
  }
  drawBG(now / 1000);
  if (L.orient === "d") drawPanel(); else drawTop();
  drawFuse(now / 1000);
  drawBelt(dt);
  drawBoard();
  drawCastle();
  drawControls();
  drawFx(dt);
  drawHand();
  if (hurtT > 0) {
    const hg = ctx.createRadialGradient(DW / 2, DH / 2, DH * .3, DW / 2, DH / 2, DH * .75);
    hg.addColorStop(0, "rgba(200,30,30,0)"); hg.addColorStop(1, "rgba(200,30,30," + (.5 * hurtT) + ")");
    ctx.fillStyle = hg; ctx.fillRect(0, 0, DW, DH);
  }
  ctx.restore();
  drawOverlay();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
